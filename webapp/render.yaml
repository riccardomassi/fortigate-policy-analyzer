# Render.com deployment configuration for Fortinet Policy Analyzer
services:
  # Backend Flask API
  - type: web
    name: fortinet-policy-analyzer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health
    # Enable auto-deploy on git push
    autoDeploy: true
    # Plan: free tier
    plan: free
    # Disk for temporary file uploads
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

  # Frontend React Static Site
  - type: static
    name: fortinet-policy-analyzer-web
    env: static
    # Build the frontend React app
    buildCommand: cd frontend && npm install && npm run build
    # The directory where the built files will be
    staticPublishPath: frontend/dist
    envVars:
      # Point frontend to backend API URL
      # IMPORTANT: After deployment, update this with your actual backend URL
      # You can find it in the Render dashboard for the backend service
      - key: VITE_API_URL
        value: https://YOUR_BACKEND_URL.onrender.com
    # Enable auto-deploy
    autoDeploy: true
    # Plan: free tier
    plan: free

# Preview environments configuration (optional)
previewsEnabled: true
